# @package _global_
defaults:
  - /lorenz63_default
  - _self_

model:
  model_type: direct_unet
  direct_unet:
    hidden_channels: [64, 128, 256]
    dropout: 0.1
training:
  stage1:
    epochs: 200
    lr: 0.001
    gradient_clip_val: 10.0
  stage2:
    epochs: 0
data:
  train_mix: cs1+cs2
  randomize_params: false
  test_randparam: false
