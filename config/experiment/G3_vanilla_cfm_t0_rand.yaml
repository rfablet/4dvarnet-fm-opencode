# @package _global_
defaults:
  - /lorenz63_default
  - _self_

model:
  model_type: vanilla_cfm
  vanilla_cfm:
    hidden_channels: [32, 64, 128]
    time_emb_dim: 64
    N_outer: 10
    sigma_prior: 0.5
    dropout: 0.1
    train_tau_0_only: true
training:
  stage1:
    epochs: 400
    lr: 0.001
    gradient_clip_val: 10.0
  stage2:
    epochs: 0
data:
  train_mix: cs1_rand+cs2_rand
  randomize_params: true
